<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Coinnect — System Architecture</text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#64748b">coinnect.bot · March 2026</text>

  <!-- ── CLIENTS (left column) ── -->
  <text x="72" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1">CLIENTS</text>

  <!-- Web Browser -->
  <rect x="14" y="96" width="116" height="48" rx="10" fill="#1e3a5f" stroke="#0284c7" stroke-width="1.5"/>
  <text x="72" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#7dd3fc">🌐 Web Browser</text>
  <text x="72" y="132" text-anchor="middle" font-size="10" fill="#64748b">coinnect.bot</text>

  <!-- AI Agent -->
  <rect x="14" y="158" width="116" height="48" rx="10" fill="#1e3a5f" stroke="#0284c7" stroke-width="1.5"/>
  <text x="72" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#7dd3fc">🤖 AI Agent</text>
  <text x="72" y="194" text-anchor="middle" font-size="10" fill="#64748b">REST / MCP</text>

  <!-- Self-hosted -->
  <rect x="14" y="220" width="116" height="48" rx="10" fill="#1c2a1c" stroke="#374151" stroke-width="1.5"/>
  <text x="72" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#9ca3af">🏠 Self-hosted</text>
  <text x="72" y="256" text-anchor="middle" font-size="10" fill="#64748b">local / private</text>

  <!-- Arrows from clients to Cloudflare -->
  <line x1="130" y1="120" x2="178" y2="186" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="130" y1="182" x2="178" y2="190" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <line x1="130" y1="244" x2="280" y2="244" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ── CLOUDFLARE (middle-left) ── -->
  <rect x="178" y="158" width="102" height="60" rx="10" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="229" y="181" text-anchor="middle" font-size="20">🔶</text>
  <text x="229" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">Cloudflare</text>
  <text x="229" y="213" text-anchor="middle" font-size="9" fill="#64748b">CDN · DDoS · proxy</text>

  <!-- Arrow Cloudflare → FastAPI -->
  <line x1="280" y1="188" x2="330" y2="215" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- ── FASTAPI CORE (center) ── -->
  <rect x="280" y="95" width="180" height="300" rx="14" fill="#0f2437" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <rect x="280" y="95" width="180" height="36" rx="14" fill="url(#cyan)" opacity="0.9"/>
  <rect x="280" y="117" width="180" height="14" rx="0" fill="url(#cyan)" opacity="0.9"/>
  <text x="370" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="white">FastAPI — coinnect.bot</text>
  <text x="370" y="133" text-anchor="middle" font-size="9" fill="#e0f7ff">ash:8100  ·  uvicorn  ·  asyncio</text>

  <!-- Endpoints inside FastAPI box -->
  <text x="297" y="158" font-size="10" fill="#7dd3fc" font-weight="600">API Endpoints</text>
  <text x="297" y="173" font-size="9" fill="#94a3b8">GET  /v1/quote</text>
  <text x="297" y="187" font-size="9" fill="#94a3b8">GET  /v1/history</text>
  <text x="297" y="201" font-size="9" fill="#94a3b8">GET  /v1/history/providers</text>
  <text x="297" y="215" font-size="9" fill="#94a3b8">GET  /v1/snapshot/daily  (CSV)</text>
  <text x="297" y="229" font-size="9" fill="#94a3b8">GET  /v1/corridors · /exchanges</text>
  <text x="297" y="243" font-size="9" fill="#94a3b8">POST /v1/keys   · /v1/suggestions</text>
  <text x="297" y="257" font-size="9" fill="#94a3b8">MCP  coinnect.mcp_server</text>

  <line x1="290" y1="264" x2="450" y2="264" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Quote Engine sub-box -->
  <rect x="290" y="272" width="160" height="52" rx="8" fill="#0a1929" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="370" y="289" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Quote Engine</text>
  <text x="370" y="304" text-anchor="middle" font-size="9" fill="#94a3b8">Graph · Dijkstra (cost + time)</text>
  <text x="370" y="317" text-anchor="middle" font-size="9" fill="#94a3b8">up to 12 routes  ·  dedup</text>

  <!-- Background refresh sub-box -->
  <rect x="290" y="336" width="160" height="44" rx="8" fill="#0a1929" stroke="#10b981" stroke-width="1.5"/>
  <text x="370" y="353" text-anchor="middle" font-size="10" font-weight="600" fill="#6ee7b7">⟳ Background Refresh</text>
  <text x="370" y="368" text-anchor="middle" font-size="9" fill="#94a3b8">every 3 min  ·  snapshots 18 corridors</text>

  <!-- ── DATA SOURCES (right column, top) ── -->
  <text x="676" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1">DATA SOURCES</text>

  <!-- CCXT box -->
  <rect x="500" y="96" width="170" height="96" rx="10" fill="#1a2234" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="585" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">CCXT (live rates)</text>
  <text x="515" y="134" font-size="9" fill="#94a3b8">• Binance — global USDC/USDT</text>
  <text x="515" y="148" font-size="9" fill="#94a3b8">• Kraken — USD / EUR anchor</text>
  <text x="515" y="162" font-size="9" fill="#94a3b8">• Coinbase — regulated US</text>
  <text x="515" y="176" font-size="9" fill="#94a3b8">• Bitso — MXN / ARS / BRL</text>

  <!-- Wise + Yellow Card box -->
  <rect x="500" y="204" width="170" height="72" rx="10" fill="#1a2234" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="585" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">Fiat / Crypto bridges</text>
  <text x="515" y="240" font-size="9" fill="#94a3b8">• Wise — 80+ currencies (live API)</text>
  <text x="515" y="256" font-size="9" fill="#94a3b8">• Yellow Card — Africa 8 countries</text>
  <text x="515" y="271" font-size="9" fill="#94a3b8">• er-api.com — FX cross-rates</text>

  <!-- Remittance box -->
  <rect x="500" y="288" width="170" height="106" rx="10" fill="#1a2234" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="585" y="306" text-anchor="middle" font-size="11" font-weight="600" fill="#c4b5fd">Remittance (~est. fees)</text>
  <text x="515" y="322" font-size="9" fill="#94a3b8">Remitly · WorldRemit · Ria</text>
  <text x="515" y="336" font-size="9" fill="#94a3b8">Sendwave · Xoom · OFX</text>
  <text x="515" y="350" font-size="9" fill="#94a3b8">Strike · XE · Global66</text>
  <text x="515" y="364" font-size="9" fill="#94a3b8">Atlantic Money · Intermex</text>
  <text x="515" y="378" font-size="9" fill="#94a3b8">Western Union · MoneyGram</text>

  <!-- Arrows FastAPI → data sources -->
  <line x1="460" y1="160" x2="497" y2="148" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-amber)"/>
  <line x1="460" y1="240" x2="497" y2="240" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-cyan)"/>
  <line x1="460" y1="298" x2="497" y2="330" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ── SQLITE DBS (bottom) ── -->
  <text x="370" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1">STORAGE</text>

  <!-- history.db -->
  <rect x="130" y="422" width="140" height="54" rx="10" fill="#0f1f0f" stroke="#10b981" stroke-width="1.5"/>
  <text x="200" y="441" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">📦 history.db</text>
  <text x="200" y="457" text-anchor="middle" font-size="9" fill="#94a3b8">rate_snapshots · routes_json</text>
  <text x="200" y="470" text-anchor="middle" font-size="9" fill="#64748b">30-day rolling · CC-BY 4.0</text>

  <!-- keys.db -->
  <rect x="290" y="422" width="140" height="54" rx="10" fill="#1f0f1f" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="360" y="441" text-anchor="middle" font-size="11" font-weight="600" fill="#c4b5fd">🔑 keys.db</text>
  <text x="360" y="457" text-anchor="middle" font-size="9" fill="#94a3b8">api_keys · tiers</text>
  <text x="360" y="470" text-anchor="middle" font-size="9" fill="#64748b">in-memory counters · warm cache</text>

  <!-- analytics.db -->
  <rect x="450" y="422" width="140" height="54" rx="10" fill="#1f1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="520" y="441" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">📊 analytics.db</text>
  <text x="520" y="457" text-anchor="middle" font-size="9" fill="#94a3b8">searches · corridors · source</text>
  <text x="520" y="470" text-anchor="middle" font-size="9" fill="#64748b">async log · admin panel</text>

  <!-- Arrows FastAPI → DBs -->
  <line x1="340" y1="395" x2="220" y2="420" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="395" x2="370" y2="420" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="395" x2="500" y2="420" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── RATE TIERS (bottom right) ── -->
  <rect x="620" y="422" width="250" height="112" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="745" y="442" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Rate Tiers</text>
  <text x="630" y="460" font-size="9" fill="#64748b">Anonymous  20 / day   50 / hour   (beta)</text>
  <text x="630" y="476" font-size="9" fill="#7dd3fc">Free key   1,000 / day  100 / hour</text>
  <text x="630" y="492" font-size="9" fill="#c4b5fd">Agent 🤖   5,000 / day  200 / hour</text>
  <text x="630" y="508" font-size="9" fill="#fbbf24">Pro        50,000 / day  2,000 / hour</text>
  <text x="630" y="524" font-size="9" fill="#374151">Self-hosted  unlimited</text>

  <!-- Legend -->
  <line x1="14" y1="540" x2="34" y2="540" stroke="#06b6d4" stroke-width="2"/>
  <text x="38" y="544" font-size="9" fill="#64748b">live API</text>
  <line x1="90" y1="540" x2="110" y2="540" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="114" y="544" font-size="9" fill="#64748b">periodic / estimated</text>
  <circle cx="210" cy="540" r="4" fill="#10b981" opacity="0.7"/>
  <text x="218" y="544" font-size="9" fill="#64748b">SQLite (single file)</text>
  <text x="750" y="544" text-anchor="end" font-size="9" fill="#334155">coinnect.bot · MIT · non-profit</text>
</svg>
