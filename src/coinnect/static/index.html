<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coinnect — The open routing layer for global money</title>
  <script>
    if (localStorage.theme === 'light') document.documentElement.classList.remove('dark');
    tailwind = { config: { darkMode: 'class' } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .route-card { transition: transform 0.2s ease; }
    .route-card:hover { transform: translateY(-2px); }
    .step-line::before {
      content: '';
      position: absolute;
      left: 11px; top: 24px; bottom: -8px;
      width: 2px;
      background: #d1d5db;
    }
    .dark .step-line::before { background: #374151; }
    .step-line:last-child::before { display: none; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .loading-dot { animation: pulse-dot 1.2s ease infinite; }
    .loading-dot:nth-child(2) { animation-delay: .2s; }
    .loading-dot:nth-child(3) { animation-delay: .4s; }
  </style>
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">

  <!-- Header -->
  <header class="border-b border-gray-200 dark:border-gray-800 px-6 py-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-sm font-bold text-white">C</div>
        <span class="font-semibold text-lg">Coinnect</span>
        <span class="text-xs text-gray-400 dark:text-gray-500 border border-gray-200 dark:border-gray-700 rounded px-2 py-0.5">beta</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-gray-400 hidden sm:block">non-profit · open source · no fees</span>
        <button onclick="toggleTheme()" id="themeBtn"
          class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-base"
          title="Toggle theme">
          <span id="themeIcon"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <div class="max-w-4xl mx-auto px-6 pt-14 pb-8 text-center">
    <h1 class="text-4xl font-bold mb-3">
      <span class="gradient-text">Find the cheapest way</span><br>
      to send money anywhere
    </h1>
    <p class="text-gray-500 dark:text-gray-400 text-lg max-w-xl mx-auto">
      Compares crypto exchanges, fiat services, and P2P platforms in real time.
      No affiliate fees. No bias. Just the best route.
    </p>
  </div>

  <!-- Quote form -->
  <div class="max-w-2xl mx-auto px-6">
    <div class="bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-6">
      <div class="grid grid-cols-3 gap-4 mb-4">
        <div class="col-span-3 sm:col-span-1">
          <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wide">Amount</label>
          <input id="amount" type="number" value="500" min="1"
            class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white text-lg font-mono focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
        </div>
        <div>
          <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wide">From</label>
          <select id="from" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-cyan-500">
            <option value="USD" selected>🇺🇸 USD</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="SGD">🇸🇬 SGD</option>
            <option value="JPY">🇯🇵 JPY</option>
            <option value="AUD">🇦🇺 AUD</option>
            <option value="CAD">🇨🇦 CAD</option>
            <option value="USDC">USDC</option>
            <option value="USDT">USDT</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wide">To</label>
          <select id="to" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-cyan-500">
            <optgroup label="Asia">
              <option value="PHP" selected>🇵🇭 PHP — Philippines</option>
              <option value="INR">🇮🇳 INR — India</option>
              <option value="IDR">🇮🇩 IDR — Indonesia</option>
              <option value="VND">🇻🇳 VND — Vietnam</option>
              <option value="THB">🇹🇭 THB — Thailand</option>
              <option value="BDT">🇧🇩 BDT — Bangladesh</option>
              <option value="PKR">🇵🇰 PKR — Pakistan</option>
              <option value="LKR">🇱🇰 LKR — Sri Lanka</option>
              <option value="NPR">🇳🇵 NPR — Nepal</option>
            </optgroup>
            <optgroup label="Latin America">
              <option value="MXN">🇲🇽 MXN — Mexico</option>
              <option value="BRL">🇧🇷 BRL — Brazil</option>
              <option value="COP">🇨🇴 COP — Colombia</option>
              <option value="ARS">🇦🇷 ARS — Argentina</option>
              <option value="PEN">🇵🇪 PEN — Peru</option>
            </optgroup>
            <optgroup label="Africa">
              <option value="NGN">🇳🇬 NGN — Nigeria</option>
              <option value="KES">🇰🇪 KES — Kenya</option>
              <option value="GHS">🇬🇭 GHS — Ghana</option>
              <option value="TZS">🇹🇿 TZS — Tanzania</option>
              <option value="UGX">🇺🇬 UGX — Uganda</option>
            </optgroup>
            <optgroup label="Crypto">
              <option value="USDC">USDC</option>
              <option value="USDT">USDT</option>
              <option value="BTC">₿ BTC</option>
              <option value="ETH">Ξ ETH</option>
            </optgroup>
          </select>
        </div>
      </div>

      <button id="searchBtn" onclick="getQuote()"
        class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 disabled:opacity-50 text-white font-semibold py-3.5 rounded-xl transition-all text-base">
        Find cheapest route →
      </button>
    </div>
  </div>

  <!-- Results -->
  <div id="results" class="max-w-2xl mx-auto px-6 mt-8 pb-16"></div>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 dark:text-gray-600 pb-8">
    <a href="/docs" class="hover:text-gray-600 dark:hover:text-gray-400 transition-colors">API docs</a>
    &nbsp;·&nbsp;
    <span>Rates refresh every 3 min</span>
    &nbsp;·&nbsp;
    <span>Coinnect never holds your funds</span>
  </footer>

<script>
const API = '';

const FLAGS = {
  USD:'🇺🇸', EUR:'🇪🇺', GBP:'🇬🇧', SGD:'🇸🇬', JPY:'🇯🇵', AUD:'🇦🇺', CAD:'🇨🇦',
  MXN:'🇲🇽', NGN:'🇳🇬', PHP:'🇵🇭', INR:'🇮🇳', ARS:'🇦🇷', BRL:'🇧🇷',
  COP:'🇨🇴', KES:'🇰🇪', GHS:'🇬🇭', IDR:'🇮🇩', VND:'🇻🇳', THB:'🇹🇭',
  BDT:'🇧🇩', PKR:'🇵🇰', LKR:'🇱🇰', NPR:'🇳🇵', PEN:'🇵🇪', TZS:'🇹🇿', UGX:'🇺🇬',
  BTC:'₿', ETH:'Ξ', USDC:'', USDT:''
};

function flag(c) { return FLAGS[c] || ''; }

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(2)+'M';
  if (n >= 1000) return n.toLocaleString('en', {maximumFractionDigits:2});
  if (n < 0.01) return n.toFixed(8).replace(/0+$/, '');
  return n.toFixed(4).replace(/\.?0+$/, '');
}

function fmtRate(send, receive, fromC, toC) {
  const rate = receive / send;
  if (rate >= 1) return `1 ${fromC} = ${fmtNum(rate)} ${toC}`;
  return `1 ${toC} = ${fmtNum(1/rate)} ${fromC}`;
}

function fmtTime(mins) {
  if (mins < 60) return `~${mins} min`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `~${h}h ${m}m` : `~${h}h`;
}

function isDark() { return document.documentElement.classList.contains('dark'); }

function toggleTheme() {
  const dark = isDark();
  document.documentElement.classList.toggle('dark', !dark);
  localStorage.theme = dark ? 'light' : 'dark';
  updateThemeIcon();
}

function updateThemeIcon() {
  document.getElementById('themeIcon').textContent = isDark() ? '☀️' : '🌙';
}

function loading() {
  document.getElementById('results').innerHTML = `
    <div class="text-center py-12 text-gray-400 dark:text-gray-500">
      <div class="flex justify-center gap-1.5 mb-3">
        <div class="w-2 h-2 rounded-full bg-cyan-400 loading-dot"></div>
        <div class="w-2 h-2 rounded-full bg-cyan-400 loading-dot"></div>
        <div class="w-2 h-2 rounded-full bg-cyan-400 loading-dot"></div>
      </div>
      <p class="text-sm">Checking exchanges in real time...</p>
    </div>`;
}

function renderSavings(routes, amount, from) {
  const wuRoute = routes.find(r => r.steps.some(s => s.via === 'Western Union'));
  const best = routes[0];
  if (!wuRoute || !best) return '';
  const saved = (amount * (wuRoute.total_cost_pct - best.total_cost_pct) / 100).toFixed(2);
  if (saved <= 0) return '';
  return `
    <div class="mb-4 bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-200 dark:border-emerald-700/40 rounded-xl px-4 py-3 flex items-center gap-3">
      <span class="text-2xl">💸</span>
      <div>
        <div class="text-emerald-700 dark:text-emerald-400 font-semibold text-sm">Save ~${from} ${saved} vs Western Union</div>
        <div class="text-gray-500 dark:text-gray-400 text-xs">Best route ${best.total_cost_pct.toFixed(2)}% · Western Union ${wuRoute.total_cost_pct.toFixed(2)}%</div>
      </div>
    </div>`;
}

function renderRoute(r, from, to) {
  const best = r.rank === 1;
  const cardBorder = best
    ? 'border-cyan-300 dark:border-cyan-500/40 bg-cyan-50/50 dark:bg-cyan-950/20'
    : 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900';
  const badge = best
    ? '<span class="text-xs bg-cyan-500/10 text-cyan-600 dark:text-cyan-400 border border-cyan-300 dark:border-cyan-500/30 rounded-full px-2 py-0.5 ml-1">Best</span>'
    : '';

  const rate = fmtRate(r.you_send, r.they_receive, from, to);

  const steps = r.steps.map(s => `
    <div class="step-line relative pl-8 pb-4">
      <div class="absolute left-0 top-1 w-6 h-6 rounded-full bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 flex items-center justify-center text-xs text-gray-500 dark:text-gray-400">${s.step}</div>
      <div class="flex flex-wrap items-center gap-1.5 mb-0.5">
        <span class="font-mono text-sm text-gray-900 dark:text-white">${flag(s.from_currency)} ${s.from_currency} → ${flag(s.to_currency)} ${s.to_currency}</span>
        <span class="text-xs text-gray-400">via</span>
        <span class="text-xs font-medium text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded px-1.5 py-0.5">${s.via}</span>
        <span class="text-xs text-gray-400">${s.fee_pct}%</span>
      </div>
      <div class="text-xs text-gray-400 dark:text-gray-500">${s.instructions}</div>
    </div>`).join('');

  return `
    <div class="route-card border ${cardBorder} rounded-xl p-5 mb-3">

      <!-- Title row -->
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center">
          <span class="font-semibold text-gray-800 dark:text-gray-100">${r.label}</span>
          ${badge}
        </div>
        <div class="flex items-center gap-3 text-xs text-gray-400 dark:text-gray-500">
          <span class="flex items-center gap-1">🕐 ${fmtTime(r.total_time_minutes)}</span>
          <span class="font-medium text-gray-500 dark:text-gray-400">${r.total_cost_pct.toFixed(2)}% fees</span>
        </div>
      </div>

      <!-- Transfer summary: 4 values -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-gray-100 dark:bg-gray-800/60 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 mb-1 uppercase tracking-wide">You send</div>
          <div class="text-xl font-bold font-mono text-gray-900 dark:text-white">${flag(from)} ${fmtNum(r.you_send)}</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">${from}</div>
        </div>
        <div class="bg-cyan-50 dark:bg-cyan-950/40 border border-cyan-200 dark:border-cyan-800/40 rounded-xl px-4 py-3">
          <div class="text-xs text-gray-400 dark:text-gray-500 mb-1 uppercase tracking-wide">They receive</div>
          <div class="text-xl font-bold font-mono text-cyan-700 dark:text-cyan-300">${flag(to)} ${fmtNum(r.they_receive)}</div>
          <div class="text-sm text-gray-500 dark:text-gray-400">${to}</div>
        </div>
      </div>

      <!-- Exchange rate -->
      <div class="flex items-center justify-center gap-2 mb-4 py-2 bg-gray-50 dark:bg-gray-800/40 rounded-lg border border-gray-100 dark:border-gray-700/40">
        <span class="text-xs text-gray-400">Exchange rate:</span>
        <span class="text-sm font-mono font-medium text-gray-700 dark:text-gray-200">${rate}</span>
      </div>

      <!-- Steps -->
      <div class="border-t border-gray-100 dark:border-gray-800 pt-4">
        ${steps}
      </div>
    </div>`;
}

async function getQuote() {
  const from = document.getElementById('from').value;
  const to = document.getElementById('to').value;
  const amount = parseFloat(document.getElementById('amount').value);
  if (!amount || amount <= 0) return;

  loading();
  document.getElementById('searchBtn').disabled = true;

  try {
    const res = await fetch(`${API}/v1/quote?from=${from}&to=${to}&amount=${amount}`);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'No routes found');
    }
    const data = await res.json();
    const routes = data.routes;

    document.getElementById('results').innerHTML = `
      <div class="text-xs text-gray-400 dark:text-gray-500 mb-4 flex items-center justify-between">
        <span>${routes.length} route${routes.length !== 1 ? 's' : ''} found</span>
        <span>Updated ${new Date(data.generated_at).toLocaleTimeString()}</span>
      </div>
      ${renderSavings(routes, amount, from)}
      ${routes.map(r => renderRoute(r, from, to)).join('')}
      <div class="mt-4 text-center text-xs text-gray-400 dark:text-gray-600">
        Coinnect shows routes — it never executes transfers or holds funds. Each exchange handles its own KYC.
      </div>`;
  } catch(e) {
    document.getElementById('results').innerHTML = `
      <div class="text-center py-8 text-gray-400 border border-gray-200 dark:border-gray-800 rounded-xl">
        <div class="text-2xl mb-2">⚠️</div>
        <div class="text-sm">${e.message}</div>
        <div class="text-xs mt-1 text-gray-400 dark:text-gray-500">This corridor may not be supported yet</div>
      </div>`;
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

window.onload = () => { updateThemeIcon(); getQuote(); };
</script>
</body>
</html>
