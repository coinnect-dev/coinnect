<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coinnect — The open routing layer for global money</title>
  <script>
    if (localStorage.theme === 'light') document.documentElement.classList.remove('dark');
    tailwind = { config: { darkMode: 'class' } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .step-line::before {
      content: '';
      position: absolute;
      left: 11px; top: 24px; bottom: -8px;
      width: 2px;
      background: #d1d5db;
    }
    .dark .step-line::before { background: #374151; }
    .step-line:last-child::before { display: none; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .loading-dot { animation: pulse-dot 1.2s ease infinite; }
    .loading-dot:nth-child(2) { animation-delay: .2s; }
    .loading-dot:nth-child(3) { animation-delay: .4s; }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">

  <!-- Header -->
  <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-4 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-sm font-bold text-white">C</div>
        <span class="font-semibold text-lg">Coinnect</span>
        <span class="text-xs text-gray-400 dark:text-gray-500 border border-gray-200 dark:border-gray-700 rounded px-2 py-0.5">beta</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-gray-400 hidden sm:block">non-profit · open source · no fees</span>
        <button onclick="toggleTheme()"
          class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-base"
          title="Toggle theme"><span id="themeIcon"></span></button>
      </div>
    </div>
  </header>

  <!-- Search bar (Kayak-style compact) -->
  <div class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-5">
    <div class="max-w-5xl mx-auto">
      <div class="flex flex-wrap gap-3 items-end">
        <div>
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">Amount</label>
          <input id="amount" type="number" value="500" min="1"
            class="w-32 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2.5 text-gray-900 dark:text-white text-base font-mono focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">From</label>
          <select id="from" class="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2.5 text-gray-900 dark:text-white focus:outline-none focus:border-cyan-500">
            <option value="USD" selected>🇺🇸 USD</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="SGD">🇸🇬 SGD</option>
            <option value="AUD">🇦🇺 AUD</option>
            <option value="CAD">🇨🇦 CAD</option>
            <option value="JPY">🇯🇵 JPY</option>
            <option value="USDC">USDC</option>
            <option value="USDT">USDT</option>
          </select>
        </div>
        <div class="text-gray-400 pb-2.5 text-lg">→</div>
        <div>
          <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wide">To</label>
          <select id="to" class="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2.5 text-gray-900 dark:text-white focus:outline-none focus:border-cyan-500">
            <optgroup label="Asia">
              <option value="PHP" selected>🇵🇭 PHP — Philippines</option>
              <option value="INR">🇮🇳 INR — India</option>
              <option value="IDR">🇮🇩 IDR — Indonesia</option>
              <option value="VND">🇻🇳 VND — Vietnam</option>
              <option value="THB">🇹🇭 THB — Thailand</option>
              <option value="BDT">🇧🇩 BDT — Bangladesh</option>
              <option value="PKR">🇵🇰 PKR — Pakistan</option>
              <option value="LKR">🇱🇰 LKR — Sri Lanka</option>
              <option value="NPR">🇳🇵 NPR — Nepal</option>
            </optgroup>
            <optgroup label="Latin America">
              <option value="MXN">🇲🇽 MXN — Mexico</option>
              <option value="BRL">🇧🇷 BRL — Brazil</option>
              <option value="COP">🇨🇴 COP — Colombia</option>
              <option value="ARS">🇦🇷 ARS — Argentina</option>
              <option value="PEN">🇵🇪 PEN — Peru</option>
            </optgroup>
            <optgroup label="Africa">
              <option value="NGN">🇳🇬 NGN — Nigeria</option>
              <option value="KES">🇰🇪 KES — Kenya</option>
              <option value="GHS">🇬🇭 GHS — Ghana</option>
              <option value="TZS">🇹🇿 TZS — Tanzania</option>
              <option value="UGX">🇺🇬 UGX — Uganda</option>
            </optgroup>
            <optgroup label="Crypto">
              <option value="USDC">USDC</option>
              <option value="USDT">USDT</option>
              <option value="BTC">₿ BTC</option>
              <option value="ETH">Ξ ETH</option>
            </optgroup>
          </select>
        </div>
        <button id="searchBtn" onclick="getQuote()"
          class="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 disabled:opacity-50 text-white font-semibold px-6 py-2.5 rounded-lg transition-all text-sm">
          Search →
        </button>
      </div>
    </div>
  </div>

  <!-- Results area -->
  <div class="max-w-5xl mx-auto px-6 py-8">
    <div id="results"></div>
  </div>

  <footer class="text-center text-xs text-gray-400 dark:text-gray-600 pb-8">
    <a href="/docs" class="hover:text-gray-600 dark:hover:text-gray-400 transition-colors">API docs</a>
    &nbsp;·&nbsp;<span>Rates refresh every 3 min</span>&nbsp;·&nbsp;
    <span>Coinnect never holds your funds</span>
  </footer>

<script>
const API = '';

const FLAGS = {
  USD:'🇺🇸', EUR:'🇪🇺', GBP:'🇬🇧', SGD:'🇸🇬', JPY:'🇯🇵', AUD:'🇦🇺', CAD:'🇨🇦',
  MXN:'🇲🇽', NGN:'🇳🇬', PHP:'🇵🇭', INR:'🇮🇳', ARS:'🇦🇷', BRL:'🇧🇷',
  COP:'🇨🇴', KES:'🇰🇪', GHS:'🇬🇭', IDR:'🇮🇩', VND:'🇻🇳', THB:'🇹🇭',
  BDT:'🇧🇩', PKR:'🇵🇰', LKR:'🇱🇰', NPR:'🇳🇵', PEN:'🇵🇪', TZS:'🇹🇿', UGX:'🇺🇬',
  BTC:'₿', ETH:'Ξ', USDC:'', USDT:''
};

// Requirements per exchange/platform
const REQS = {
  'Binance':       { sender: ['Binance account', 'Email verified', 'KYC (ID + selfie)'], recipient: ['Binance account (if crypto)', 'Or bank account for withdrawals'], kyc: 'Required', url: 'binance.com' },
  'Kraken':        { sender: ['Kraken account', 'Email verified', 'KYC for fiat (ID + address proof)'], recipient: ['Crypto wallet or Kraken account'], kyc: 'Required for fiat', url: 'kraken.com' },
  'Coinbase':      { sender: ['Coinbase account', 'Full KYC (ID + SSN for US)'], recipient: ['Crypto wallet or Coinbase account'], kyc: 'Required', url: 'coinbase.com' },
  'Bitso':         { sender: ['Bitso account', 'Mexican phone number', 'RFC (Mexico tax ID)'], recipient: ['MXN bank account (CLABE)'], kyc: 'Required', url: 'bitso.com' },
  'Wise':          { sender: ['Wise account', 'ID verification', 'Bank account in sender country'], recipient: ['Bank account in recipient country', 'Name must match'], kyc: 'Required', url: 'wise.com' },
  'Western Union': { sender: ['Valid government ID', 'Cash or debit card at agent'], recipient: ['Show valid ID at agent or bank account'], kyc: 'ID at pickup', url: 'westernunion.com' },
  'MoneyGram':     { sender: ['Valid government ID', 'Cash or card at agent or online'], recipient: ['Show valid ID at agent'], kyc: 'ID at pickup', url: 'moneygram.com' },
};

const FEATURED_LABELS = { 'Cheapest': '💰', 'Balanced': '⚖️', 'Fastest': '⚡' };

function flag(c) { return FLAGS[c] || ''; }

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(2)+'M';
  if (n >= 1000) return n.toLocaleString('en', {maximumFractionDigits:2});
  if (n < 0.01) return n.toFixed(8).replace(/0+$/, '');
  return n.toFixed(4).replace(/\.?0+$/, '');
}

function fmtRate(send, receive, fromC, toC) {
  const rate = receive / send;
  return rate >= 1 ? `1 ${fromC} = ${fmtNum(rate)} ${toC}` : `1 ${toC} = ${fmtNum(1/rate)} ${fromC}`;
}

function fmtTime(mins) {
  if (mins < 60) return `~${mins}m`;
  const h = Math.floor(mins/60), m = mins%60;
  return m ? `~${h}h${m}m` : `~${h}h`;
}

function isDark() { return document.documentElement.classList.contains('dark'); }

function toggleTheme() {
  const dark = isDark();
  document.documentElement.classList.toggle('dark', !dark);
  localStorage.theme = dark ? 'light' : 'dark';
  updateThemeIcon();
}
function updateThemeIcon() {
  document.getElementById('themeIcon').textContent = isDark() ? '☀️' : '🌙';
}

function loading() {
  document.getElementById('results').innerHTML = `
    <div class="text-center py-16 text-gray-400">
      <div class="flex justify-center gap-1.5 mb-3">
        <div class="w-2 h-2 rounded-full bg-cyan-400 loading-dot"></div>
        <div class="w-2 h-2 rounded-full bg-cyan-400 loading-dot"></div>
        <div class="w-2 h-2 rounded-full bg-cyan-400 loading-dot"></div>
      </div>
      <p class="text-sm">Checking exchanges in real time...</p>
    </div>`;
}

function renderReqs(viaList) {
  const reqs = viaList.map(via => REQS[via]).filter(Boolean);
  if (!reqs.length) return '';

  // Deduplicate across all steps
  const senderReqs = [...new Set(reqs.flatMap(r => r.sender))];
  const recipientReqs = [...new Set(reqs.flatMap(r => r.recipient))];
  const platforms = viaList.filter(v => REQS[v]);

  return `
    <div class="mt-4 grid grid-cols-2 gap-3">
      <div class="bg-blue-50 dark:bg-blue-950/30 border border-blue-100 dark:border-blue-800/40 rounded-xl p-3">
        <div class="text-xs font-semibold text-blue-700 dark:text-blue-400 mb-2 uppercase tracking-wide">Sender needs</div>
        ${senderReqs.map(r => `<div class="flex items-start gap-1.5 mb-1"><span class="text-blue-400 mt-0.5 text-xs">•</span><span class="text-xs text-gray-600 dark:text-gray-300">${r}</span></div>`).join('')}
      </div>
      <div class="bg-violet-50 dark:bg-violet-950/30 border border-violet-100 dark:border-violet-800/40 rounded-xl p-3">
        <div class="text-xs font-semibold text-violet-700 dark:text-violet-400 mb-2 uppercase tracking-wide">Recipient needs</div>
        ${recipientReqs.map(r => `<div class="flex items-start gap-1.5 mb-1"><span class="text-violet-400 mt-0.5 text-xs">•</span><span class="text-xs text-gray-600 dark:text-gray-300">${r}</span></div>`).join('')}
      </div>
    </div>`;
}

function renderSteps(steps) {
  return steps.map(s => `
    <div class="step-line relative pl-8 pb-3">
      <div class="absolute left-0 top-1 w-6 h-6 rounded-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 flex items-center justify-center text-xs text-gray-500 dark:text-gray-400">${s.step}</div>
      <div class="flex flex-wrap items-center gap-1.5 mb-0.5">
        <span class="font-mono text-sm text-gray-900 dark:text-white">${flag(s.from_currency)} ${s.from_currency} → ${flag(s.to_currency)} ${s.to_currency}</span>
        <span class="text-xs text-gray-400">via</span>
        <span class="text-xs font-medium text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded px-1.5 py-0.5">${s.via}</span>
        <span class="text-xs text-gray-400">${s.fee_pct}% · ${fmtTime(s.estimated_minutes)}</span>
      </div>
      <div class="text-xs text-gray-400 dark:text-gray-500">${s.instructions}</div>
    </div>`).join('');
}

function renderFeaturedCard(r, from, to) {
  const emoji = FEATURED_LABELS[r.label] || '';
  const isBest = r.rank === 1;
  const border = isBest
    ? 'border-cyan-300 dark:border-cyan-600/50 ring-1 ring-cyan-200 dark:ring-cyan-800'
    : 'border-gray-200 dark:border-gray-700';
  const viaList = [...new Set(r.steps.map(s => s.via))];

  return `
    <div class="bg-white dark:bg-gray-900 border ${border} rounded-2xl overflow-hidden">
      <!-- Header strip -->
      <div class="flex items-center justify-between px-5 py-3 border-b border-gray-100 dark:border-gray-800">
        <div class="flex items-center gap-2">
          <span class="text-base">${emoji}</span>
          <span class="font-semibold text-sm text-gray-700 dark:text-gray-200">${r.label}</span>
          ${isBest ? '<span class="text-xs bg-cyan-500/10 text-cyan-600 dark:text-cyan-400 border border-cyan-200 dark:border-cyan-700 rounded-full px-2 py-0.5">Best</span>' : ''}
        </div>
        <div class="flex items-center gap-3 text-xs text-gray-400">
          <span>🕐 ${fmtTime(r.total_time_minutes)}</span>
          <span class="font-medium text-gray-500 dark:text-gray-400">${r.total_cost_pct.toFixed(2)}% fees</span>
        </div>
      </div>

      <!-- Transfer values -->
      <div class="grid grid-cols-2 gap-0 divide-x divide-gray-100 dark:divide-gray-800">
        <div class="px-5 py-4">
          <div class="text-xs text-gray-400 mb-1 uppercase tracking-wide">You send</div>
          <div class="text-2xl font-bold font-mono text-gray-900 dark:text-white">${fmtNum(r.you_send)}</div>
          <div class="text-sm text-gray-400 mt-0.5">${flag(from)} ${from}</div>
        </div>
        <div class="px-5 py-4 bg-cyan-50/50 dark:bg-cyan-950/20">
          <div class="text-xs text-gray-400 mb-1 uppercase tracking-wide">They receive</div>
          <div class="text-2xl font-bold font-mono text-cyan-700 dark:text-cyan-300">${fmtNum(r.they_receive)}</div>
          <div class="text-sm text-gray-400 mt-0.5">${flag(to)} ${to}</div>
        </div>
      </div>

      <!-- Rate bar -->
      <div class="px-5 py-2.5 bg-gray-50 dark:bg-gray-800/50 border-t border-b border-gray-100 dark:border-gray-800 flex items-center gap-2">
        <span class="text-xs text-gray-400">Rate:</span>
        <span class="text-xs font-mono font-medium text-gray-700 dark:text-gray-200">${fmtRate(r.you_send, r.they_receive, from, to)}</span>
        <span class="ml-auto text-xs text-gray-400">via ${viaList.join(' + ')}</span>
      </div>

      <!-- Expandable details -->
      <details class="group">
        <summary class="flex items-center justify-between px-5 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors select-none">
          <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Steps & requirements</span>
          <span class="text-gray-400 text-xs transition-transform group-open:rotate-180">▼</span>
        </summary>
        <div class="px-5 pb-5">
          <div class="pt-3 border-t border-gray-100 dark:border-gray-800">
            ${renderSteps(r.steps)}
          </div>
          ${renderReqs(viaList)}
        </div>
      </details>
    </div>`;
}

function renderCompactRow(r, from, to) {
  const viaList = [...new Set(r.steps.map(s => s.via))];
  return `
    <details class="group bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
      <summary class="flex items-center gap-4 px-5 py-3.5 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
        <div class="flex-1 flex items-center gap-3">
          <span class="text-sm font-medium text-gray-600 dark:text-gray-300 w-20">${r.label}</span>
          <span class="text-xs text-gray-400">via ${viaList.join(' + ')}</span>
        </div>
        <div class="flex items-center gap-6 text-sm">
          <div class="text-right hidden sm:block">
            <div class="font-mono text-gray-500 dark:text-gray-400 text-xs">${fmtNum(r.you_send)} ${from}</div>
          </div>
          <div class="text-right">
            <div class="font-mono font-semibold text-cyan-700 dark:text-cyan-300">${fmtNum(r.they_receive)} ${to}</div>
            <div class="text-xs text-gray-400">${r.total_cost_pct.toFixed(2)}% · ${fmtTime(r.total_time_minutes)}</div>
          </div>
        </div>
        <span class="text-gray-400 text-xs transition-transform group-open:rotate-180 ml-2">▼</span>
      </summary>
      <div class="px-5 pb-5 border-t border-gray-100 dark:border-gray-800">
        <div class="pt-3 grid grid-cols-2 gap-0 divide-x divide-gray-100 dark:divide-gray-800 mb-3">
          <div class="pr-4">
            <div class="text-xs text-gray-400 mb-1">You send</div>
            <div class="font-mono font-bold text-gray-900 dark:text-white">${fmtNum(r.you_send)} <span class="text-gray-400 font-normal">${from}</span></div>
          </div>
          <div class="pl-4">
            <div class="text-xs text-gray-400 mb-1">They receive</div>
            <div class="font-mono font-bold text-cyan-700 dark:text-cyan-300">${fmtNum(r.they_receive)} <span class="text-gray-400 font-normal">${to}</span></div>
          </div>
        </div>
        <div class="text-xs text-gray-400 mb-4 font-mono">Rate: ${fmtRate(r.you_send, r.they_receive, from, to)}</div>
        ${renderSteps(r.steps)}
        ${renderReqs(viaList)}
      </div>
    </details>`;
}

function renderSavings(routes, amount, from) {
  const wu = routes.find(r => r.steps.some(s => s.via === 'Western Union'));
  const best = routes[0];
  if (!wu || !best) return '';
  const saved = (amount * (wu.total_cost_pct - best.total_cost_pct) / 100).toFixed(2);
  if (saved <= 0) return '';
  return `
    <div class="mb-6 bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-200 dark:border-emerald-700/40 rounded-xl px-4 py-3 flex items-center gap-3">
      <span class="text-2xl">💸</span>
      <div>
        <div class="text-emerald-700 dark:text-emerald-400 font-semibold text-sm">Save ~${from} ${saved} vs Western Union</div>
        <div class="text-gray-500 text-xs">Best route ${best.total_cost_pct.toFixed(2)}% · Western Union ${wu.total_cost_pct.toFixed(2)}%</div>
      </div>
    </div>`;
}

async function getQuote() {
  const from = document.getElementById('from').value;
  const to   = document.getElementById('to').value;
  const amount = parseFloat(document.getElementById('amount').value);
  if (!amount || amount <= 0) return;

  loading();
  document.getElementById('searchBtn').disabled = true;

  try {
    const res = await fetch(`${API}/v1/quote?from=${from}&to=${to}&amount=${amount}`);
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'No routes found'); }
    const data = await res.json();
    const routes = data.routes;
    const featured = routes.filter(r => r.label in FEATURED_LABELS);
    const extras   = routes.filter(r => !(r.label in FEATURED_LABELS));

    document.getElementById('results').innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <div class="text-sm text-gray-500 dark:text-gray-400">${routes.length} routes found · ${flag(from)} ${from} → ${flag(to)} ${to}</div>
        <div class="text-xs text-gray-400">Updated ${new Date(data.generated_at).toLocaleTimeString()}</div>
      </div>
      ${renderSavings(routes, amount, from)}

      <!-- Featured top 3 -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        ${featured.map(r => renderFeaturedCard(r, from, to)).join('')}
      </div>

      <!-- More options -->
      ${extras.length ? `
        <div class="mb-2">
          <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">More options</div>
          <div class="flex flex-col gap-2">
            ${extras.map(r => renderCompactRow(r, from, to)).join('')}
          </div>
        </div>` : ''}

      <div class="mt-6 text-center text-xs text-gray-400 dark:text-gray-600">
        Coinnect shows routes — it never executes transfers or holds funds. Each exchange handles its own KYC.
      </div>`;
  } catch(e) {
    document.getElementById('results').innerHTML = `
      <div class="text-center py-12 text-gray-400 border border-gray-200 dark:border-gray-800 rounded-xl">
        <div class="text-3xl mb-3">⚠️</div>
        <div class="text-sm font-medium">${e.message}</div>
        <div class="text-xs mt-1">This corridor may not be supported yet</div>
      </div>`;
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

window.onload = () => { updateThemeIcon(); getQuote(); };
</script>
</body>
</html>
