<svg width="40" height="50" viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7931A"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="usd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="plug" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <clipPath id="lh"><rect x="0" y="0" width="20" height="40"/></clipPath>
    <clipPath id="rh"><rect x="20" y="0" width="20" height="40"/></clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Coin: left half BTC -->
  <circle cx="20" cy="20" r="19" fill="url(#btc)" clip-path="url(#lh)" filter="url(#shadow)"/>
  <!-- Coin: right half USD/Coinnect -->
  <circle cx="20" cy="20" r="19" fill="url(#usd)" clip-path="url(#rh)" filter="url(#shadow)"/>

  <!-- Coin rim -->
  <circle cx="20" cy="20" r="19" fill="none" stroke="white" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Center connector (dashed seam = "connect") -->
  <line x1="20" y1="2" x2="20" y2="38" stroke="white" stroke-width="1.5" stroke-dasharray="2.5,2" stroke-opacity="0.9"/>

  <!-- BTC ₿ symbol -->
  <text x="10" y="25.5" text-anchor="middle" fill="white" font-size="14" font-weight="900"
        font-family="'Arial Black', system-ui, sans-serif" opacity="0.95">₿</text>

  <!-- Dollar $ symbol -->
  <text x="30" y="25.5" text-anchor="middle" fill="white" font-size="14" font-weight="900"
        font-family="'Arial Black', system-ui, sans-serif" opacity="0.95">$</text>

  <!-- Plug body (base plate) -->
  <rect x="12" y="38" width="16" height="4" rx="1.5" fill="url(#plug)"/>

  <!-- Plug prong left -->
  <rect x="14.5" y="42" width="4" height="8" rx="1.5" fill="url(#plug)"/>
  <!-- Plug prong right -->
  <rect x="21.5" y="42" width="4" height="8" rx="1.5" fill="url(#plug)"/>

  <!-- Plug prong tips (slight highlight) -->
  <rect x="14.5" y="48" width="4" height="2" rx="1" fill="#475569"/>
  <rect x="21.5" y="48" width="4" height="2" rx="1" fill="#475569"/>
</svg>
